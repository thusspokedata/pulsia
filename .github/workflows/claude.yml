name: Claude Code

# Se dispara cuando alguien menciona @claude en un comentario/issue/review.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Solo corre si el disparador contiene "@claude".
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # En tag mode, la Action postea un comentario placeholder y luego Claude lo REEMPLAZA con el
    # resultado — para eso Claude necesita write sobre pull-requests/issues (con read se queda en el
    # placeholder y termina en ~2s sin hacer nada). Ver README de anthropics/claude-code-action.
    permissions:
      contents: read # review-only: no puede pushear código (subir a write si querés que edite)
      pull-requests: write
      issues: write
      id-token: write
      actions: read # leer resultados de CI del PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # DEBUG temporal: exponer el output real de la SDK para ver el error de auth.
          show_full_output: true
