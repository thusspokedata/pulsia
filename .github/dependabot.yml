version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Estas deps las gobierna Expo SDK: se bumpean con `expo install` durante
      # un upgrade de SDK, no sueltas por dependabot (rompen el build nativo / exigen APK nuevo).
      # OJO: se ignoran solo los *version updates* (los 3 semver-*), NO los security updates
      # — un `ignore` sin update-types también silenciaría los PRs de CVE de estos paquetes.
      - dependency-name: "react"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@react-native-async-storage/async-storage"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "expo"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "jest-expo"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      # jest está pineado a 29 por compatibilidad con jest-expo 57: sin majors (security igual pasa).
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
      # @babel/runtime lo gobierna la cadena de Expo/RN (expo, babel-preset-expo, metro-runtime fijan
      # ^7.x). Babel 8 funciona hoy solo por casualidad (ninguna dep usa los helpers que 8 eliminó) y
      # rompería en el bundling de prod ante un bump futuro. Sin majors hasta que Expo declare soporte.
      - dependency-name: "@babel/runtime"
        update-types: ["version-update:semver-major"]
      # typescript es devDep del móvil: cualquier bump (hasta un patch) cambia el runtimeVersion
      # (fingerprint) del APK y ROMPE el canal OTA hacia el APK instalado (vc7). Se bumpea a mano,
      # coordinado con un build de APK nuevo. TS7 además es el compilador nativo (binarios por plataforma).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    groups:
      # minor + patch juntos (mergeables de rutina). Los majors quedan SIN grupo
      # a propósito → dependabot abre un PR individual por cada uno, para revisarlos aparte.
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns: ["*"]
      npm-security-updates:
        applies-to: security-updates
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
